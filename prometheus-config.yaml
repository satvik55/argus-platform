apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-server
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      evaluation_interval: 1m
      scrape_interval: 1m
      scrape_timeout: 10s

    scrape_configs:
      - job_name: 'argus-api'
        metrics_path: /metrics
        static_configs:
          - targets: ['13.206.30.240:30080']

      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']