{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "argus-api.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "argus-api.labels" . | nindent 4 }}
    # This label MUST match the Prometheus serviceMonitorSelector.
    # kube-prometheus-stack defaults to selecting ServiceMonitors with
    # release: <prometheus-helm-release-name>.  We add it here.
    release: prometheus
spec:
  selector:
    matchLabels:
      {{- include "argus-api.selectorLabels" . | nindent 6 }}
  namespaceSelector:
    matchNames:
      - {{ .Release.Namespace }}
  endpoints:
    - port: http
      path: {{ .Values.serviceMonitor.path }}
      interval: {{ .Values.serviceMonitor.interval }}
{{- end }}
